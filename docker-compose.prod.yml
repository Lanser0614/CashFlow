services:
  app:
    build:
      context: .
      dockerfile: ./docker/prod/app.Dockerfile
      args:
        VITE_NATS_WS_URL: ${VITE_NATS_WS_URL:-}
    environment:
      APP_NAME: ${APP_NAME:-Cash Flow 101}
      APP_ENV: production
      APP_DEBUG: "false"
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}
      LOG_CHANNEL: stderr
      LOG_LEVEL: warning
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      NATS_HOST: nats
      NATS_PORT: 4222
      LIVEKIT_HTTP_URL: http://livekit:7880
      LIVEKIT_WS_URL: ${LIVEKIT_WS_URL}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
    ports:
      - "${APP_PORT:-80}:8080"
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_healthy
      livekit:
        condition: service_started
    volumes:
      - backend_storage:/var/www/backend/storage
    restart: unless-stopped

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    restart: unless-stopped

  nats:
    image: nats:2-alpine
    command: ["-c", "/etc/nats/nats.conf"]
    volumes:
      - nats_data:/data
      - ./docker/nats/nats.conf:/etc/nats/nats.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8222/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  livekit:
    image: livekit/livekit-server:latest
    environment:
      LIVEKIT_CONFIG: |
        port: 7880
        log_level: info
        rtc:
          tcp_port: 7881
          udp_port: 7882
          use_external_ip: true
        redis:
          address: redis:6379
        keys:
          ${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}
    depends_on:
      redis:
        condition: service_started
    ports:
      - "${LIVEKIT_TCP_PORT:-7881}:7881/tcp"
      - "${LIVEKIT_UDP_PORT:-7882}:7882/udp"
    restart: unless-stopped

volumes:
  backend_storage:
  mysql_data:
  nats_data:

