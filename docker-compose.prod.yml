services:
  frontend:
    build:
      context: ./apps/frontend
      dockerfile: ../../docker/frontend/Dockerfile
    working_dir: /workspace
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_URL: https://api.blatnoy.uz
      VITE_LIVEKIT_URL: ws://localhost:7880
    ports:
      - "5173:5173"
    volumes:
      - ./apps/frontend:/workspace
      - frontend_node_modules:/workspace/node_modules
    depends_on:
      backend:
        condition: service_started
      livekit:
        condition: service_started

  backend:
    build:
      context: ./apps/backend
      dockerfile: ../../docker/backend/Dockerfile
    working_dir: /workspace
    command: >
      sh -lc "composer install --no-interaction --prefer-dist &&
      php artisan migrate --force &&
      php artisan serve --host=0.0.0.0 --port=8000"
    environment:
      APP_ENV: production
      APP_DEBUG: "true"
      APP_URL: https://api.blatnoy.uz
      APP_KEY: base64:Y2FzaGZsb3cxMDFkb2NrZXJjb21wb3Nla2V5MTIzNDU=
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: cashflow
      DB_USERNAME: cashflow
      DB_PASSWORD: cashflow
      LOG_CHANNEL: stderr
      NATS_HOST: nats
      NATS_PORT: 4222
      JANUS_API_SECRET: cashflow-janus-secret
      LIVEKIT_HTTP_URL: http://livekit:7880
      LIVEKIT_WS_URL: ws://localhost:7880
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: secret
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_REDIRECT_URI: https://api.blatnoy.uz/api/auth/google/callback
      FRONTEND_URL: https://blatnoy.uz
    ports:
      - "8000:8000"
    volumes:
      - ./apps/backend:/workspace
      - backend_vendor:/workspace/vendor
    depends_on:
      db:
        condition: service_healthy
      nats:
        condition: service_healthy
      janus:
        condition: service_healthy
      livekit:
        condition: service_started

  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: cashflow
      MYSQL_USER: cashflow
      MYSQL_PASSWORD: cashflow
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  nats:
    image: nats:2-alpine
    command: ["-c", "/etc/nats/nats.conf"]
    ports:
      - "4222:4222"
      - "8222:8222"
      - "9222:9222"
    volumes:
      - ./nats_data:/data
      - ./docker/nats/nats.conf:/etc/nats/nats.conf:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  nats-ui:
    image: mdawar/nats-dashboard
    ports:
      - "8282:80"
    depends_on:
      nats:
        condition: service_healthy

  nats-box:
    image: natsio/nats-box
    command: sleep infinity
    depends_on:
      nats:
        condition: service_healthy

  janus:
    image: swmansion/janus-gateway:1.2.3-0
    entrypoint: ["/usr/local/bin/janus"]
    ports:
      - "8188:8188"
      - "10000-10200:10000-10200/udp"
    volumes:
      - ./docker/janus:/usr/local/etc/janus:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "test -f /proc/1/status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  livekit:
    image: livekit/livekit-server:latest
    command: --dev --bind 0.0.0.0 --node-ip 127.0.0.1
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    restart: unless-stopped

volumes:
  frontend_node_modules:
  backend_vendor:
  mysql_data:
  nats_data:

